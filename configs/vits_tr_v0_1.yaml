# VITS training config for gokbilge-tts v0.1 — ISSAI Turkish
# Architecture follows the original VITS paper (Kim et al., 2021)

model:
  name: vits
  hidden_channels: 192
  filter_channels: 768
  n_heads: 2
  n_layers: 6
  kernel_size: 3
  p_dropout: 0.1
  resblock: "1"
  resblock_kernel_sizes: [3, 7, 11]
  resblock_dilation_sizes: [[1, 3, 5], [1, 3, 5], [1, 3, 5]]
  upsample_rates: [8, 8, 2, 2]
  upsample_initial_channel: 512
  upsample_kernel_sizes: [16, 16, 4, 4]
  n_speakers: 1
  gin_channels: 0

audio:
  sample_rate: 22050
  hop_length: 256
  win_length: 1024
  n_fft: 1024
  n_mel_channels: 80
  mel_fmin: 0.0
  mel_fmax: 8000.0

train:
  epochs: 1000
  batch_size: 16
  learning_rate: 2.0e-4
  betas: [0.8, 0.99]
  eps: 1.0e-9
  lr_decay: 0.999875
  segment_size: 8192
  c_mel: 45
  c_kl: 1.0
  fp16_run: false
  seed: 1234
  log_interval: 200
  eval_interval: 1000
  save_interval: 1000

data:
  manifest: data/issai_manifest.jsonl
  phoneme_type: gokbilge  # uses src/gokbilge_tts/g2p/turkish.py
  text_cleaners: [turkish_cleaners]
  max_wav_value: 32768.0
  filter_length: 1024
  hop_length: 256
  win_length: 1024
  sampling_rate: 22050
  mel_fmin: 0.0
  mel_fmax: 8000.0
  max_text_len: 190
  min_audio_len: 0.5  # seconds
  max_audio_len: 20.0  # seconds
